<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 資安政策：嚴格限制連線來源與指令碼執行 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://speed.cloudflare.com; img-src 'self' https://placehold.co data:; manifest-src 'self';">
    
    <title>SpeedTest Pro - 安全測速</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d131f">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="192.png">

    <style>
        :root {
            --bg-color: #0d131f;
            --card-bg: #1e2532;
            --primary-cyan: #3abff8;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-green: #34d399;
            --accent-pink: #f472b6;
            --border-style: 1px solid rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        
        /* 標題與資安徽章 */
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .title h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
        .security-badge { font-size: 11px; background: rgba(52, 211, 153, 0.1); color: var(--accent-green); padding: 4px 8px; border-radius: 20px; display: flex; align-items: center; gap: 4px; margin-top: 4px; border: 1px solid rgba(52, 211, 153, 0.2); }

        /* 數據卡片 */
        .top-stats { display: flex; gap: 12px; }
        .stat-card { flex: 1; background-color: var(--card-bg); border-radius: 14px; padding: 14px; border: var(--border-style); }
        .stat-card h3 { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .stat-card p { font-size: 18px; font-weight: 700; }

        /* 指針儀表區域 */
        .gauge-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 240px; }
        .svg-gauge { position: absolute; width: 230px; height: 230px; transform: rotate(135deg); }
        .gauge-bg { fill: none; stroke: #252d3d; stroke-width: 10; stroke-dasharray: 424 565; }
        .gauge-progress { fill: none; stroke: var(--primary-cyan); stroke-width: 10; stroke-dasharray: 565; stroke-dashoffset: 565; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease-out; }
        .gauge-content { text-align: center; z-index: 10; }
        .gauge-value { font-size: 52px; font-weight: 800; line-height: 1; }
        .gauge-unit { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .gauge-label { color: var(--primary-cyan); font-size: 13px; margin-top: 10px; font-weight: 600; letter-spacing: 1px; }

        .bottom-stats { display: flex; gap: 12px; }
        .main-stat-card { flex: 1; background-color: var(--card-bg); border-radius: 14px; padding: 18px; text-align: center; border: var(--border-style); }
        .main-stat-card h3 { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
        .main-stat-card p { font-size: 22px; font-weight: 700; }

        /* 按鈕 */
        .start-btn { background-color: var(--primary-cyan); color: #000; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(58, 191, 248, 0.2); }
        .start-btn:active { transform: scale(0.98); }
        .start-btn:disabled { background-color: #333; color: #666; box-shadow: none; }

        /* 頁尾與版本資訊 */
        .footer { text-align: center; margin-top: 10px; }
        .version-text { font-size: 10px; color: #4b5563; letter-spacing: 1px; font-weight: 600; }
        .security-info { font-size: 9px; color: #4b5563; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="title">
            <h1>SpeedTest Pro</h1>
            <div class="security-badge">
                <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10.91h-6V11c0-3.31 2.69-6 6-6s6 2.69 6 6v1.91h-6z"/></svg>
                SSL 加密安全連線
            </div>
        </div>
    </header>

    <div class="top-stats">
        <div class="stat-card">
            <h3>延遲 (Ping)</h3>
            <p id="pingVal">-- ms</p>
        </div>
        <div class="stat-card">
            <h3>訊號抖動</h3>
            <p id="jitterVal">-- ms</p>
        </div>
    </div>

    <div class="gauge-container">
        <svg class="svg-gauge" viewBox="0 0 200 200">
            <circle class="gauge-bg" cx="100" cy="100" r="90"></circle>
            <circle class="gauge-progress" id="gaugeProgress" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="gauge-content">
            <div class="gauge-value" id="mainValue">0</div>
            <div class="gauge-unit">Mbps</div>
            <div class="gauge-label" id="mainLabel">準備就緒</div>
        </div>
    </div>

    <div class="bottom-stats">
        <div class="main-stat-card">
            <h3>下載速度</h3>
            <p id="dlVal">0.0</p>
        </div>
        <div class="main-stat-card">
            <h3>上傳速度</h3>
            <p id="ulVal">0.0</p>
        </div>
    </div>

    <button class="start-btn" id="startBtn">開始測試</button>

    <footer class="footer">
        <div class="version-text">版本資訊 v1.3.0 (PWA)</div>
        <div class="security-info">無追蹤程式碼 • 隱私防護模式 • 官方節點</div>
    </footer>
</div>

<script>
    const UI = {
        btn: document.getElementById('startBtn'),
        mainVal: document.getElementById('mainValue'),
        mainLabel: document.getElementById('mainLabel'),
        dlVal: document.getElementById('dlVal'),
        ulVal: document.getElementById('ulVal'),
        pingVal: document.getElementById('pingVal'),
        jitterVal: document.getElementById('jitterVal'),
        gauge: document.getElementById('gaugeProgress')
    };

    const MAX_DASH = 565;
    const ARC_LENGTH = 424;

    function updateGauge(mbps, maxMbps = 100) {
        let percent = Math.min((mbps / maxMbps) * 100, 100);
        const offset = MAX_DASH - (percent / 100) * ARC_LENGTH;
        UI.gauge.style.strokeDashoffset = offset;
    }

    function setUIState(label, color) {
        UI.mainLabel.innerText = label;
        UI.mainLabel.style.color = color;
        UI.gauge.style.stroke = color;
    }

    // 1. 延遲量測
    async function testPing() {
        setUIState('正在量測延遲...', 'var(--accent-pink)');
        let pings = [];
        for (let i = 0; i < 6; i++) {
            let start = performance.now();
            try {
                await fetch('https://speed.cloudflare.com/__down?bytes=0', { mode: 'no-cors', cache: 'no-store' });
                pings.push(performance.now() - start);
            } catch (e) {}
        }
        if (pings.length === 0) return;
        let avg = pings.reduce((a, b) => a + b) / pings.length;
        UI.pingVal.innerText = Math.round(avg) + ' ms';
        let jitter = Math.abs(pings[pings.length-1] - pings[0]);
        UI.jitterVal.innerText = Math.round(jitter) + ' ms';
    }

    // 2. 下載測試
    async function testDownload() {
        setUIState('下載測試中...', 'var(--primary-cyan)');
        const testBytes = 15 * 1024 * 1024; // 15MB
        const start = performance.now();
        try {
            const response = await fetch(`https://speed.cloudflare.com/__down?bytes=${testBytes}`, { cache: 'no-store' });
            const reader = response.body.getReader();
            let loaded = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                loaded += value.length;
                let duration = (performance.now() - start) / 1000;
                if (duration > 0.1) {
                    let mbps = (loaded * 8 / 1000000) / duration;
                    UI.mainVal.innerText = mbps.toFixed(1);
                    UI.dlVal.innerText = mbps.toFixed(1);
                    updateGauge(mbps, 200);
                }
            }
        } catch (e) {}
    }

    // 3. 上傳測試
    // 新增一個延遲函數
const delay = ms => new Promise(res => setTimeout(res, ms));

async function testUpload() {
    setUIState('上傳測試中...', 'var(--accent-green)');
    
    const totalSize = 4 * 1024 * 1024; // 總量 4MB
    const chunkSize = 512 * 1024;     // 每段 512KB (共 8 段)
    const numChunks = totalSize / chunkSize;
    
    // 產生隨機數據（安全分段產生）
    const chunkData = new Uint8Array(chunkSize);
    window.crypto.getRandomValues(chunkData);

    let uploadedBytes = 0;
    const start = performance.now();

    try {
        for (let i = 0; i < numChunks; i++) {
            // 使用 fetch + no-cors：這是唯一能完全避開預檢請求的方法
            await fetch('https://speed.cloudflare.com/__up', {
                method: 'POST',
                body: chunkData,
                mode: 'no-cors', // 強制不檢查 CORS
                cache: 'no-store'
            });

            uploadedBytes += chunkSize;
            
            // 每傳完一段就計算一次即時速度，讓儀表板指針跳動
            const now = performance.now();
            const duration = (now - start) / 1000;
            if (duration > 0) {
                const mbps = (uploadedBytes * 8 / 1000000) / duration;
                UI.mainVal.innerText = mbps.toFixed(1);
                UI.ulVal.innerText = mbps.toFixed(1);
                updateGauge(mbps, 60);
            }
        }

        const finalDuration = (performance.now() - start) / 1000;
        return (uploadedBytes * 8 / 1000000) / finalDuration;

    } catch (e) {
        console.error("上傳失敗:", e);
        UI.ulVal.innerText = '量測失敗';
        return 0;
    }
}

// 修改按鈕點擊後的執行流程
UI.btn.addEventListener('click', async () => {
    UI.btn.disabled = true;
    UI.btn.innerText = '測試執行中...';
    
    // 重置數值
    UI.dlVal.innerText = '0.0';
    UI.ulVal.innerText = '0.0';
    UI.pingVal.innerText = '-- ms';
    UI.jitterVal.innerText = '-- ms';
    
    try {
        await testPing();
        await delay(500);
        await testDownload();
        // 這裡會自動進入 testUpload 的冷卻時間
        await testUpload();
        
        setUIState('測試完畢', '#fff');
        updateGauge(0);
    } catch (e) {
        setUIState('連線異常', 'red');
    }
    
    UI.btn.disabled = false;
    UI.btn.innerText = '重新測試';
});
    UI.btn.addEventListener('click', async () => {
        UI.btn.disabled = true;
        UI.btn.innerText = '測試執行中...';
        await testPing();
        await testDownload();
        await testUpload();
        setUIState('測試完畢', '#fff');
        updateGauge(0);
        UI.btn.disabled = false;
        UI.btn.innerText = '重新測試';
    });

    // PWA 更新邏輯
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        window.location.reload();
                    }
                };
            };
        });
    }
</script>
</body>
</html>
